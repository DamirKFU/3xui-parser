name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/3xui-parser:latest .

    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/3xui-parser:latest


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |

          docker pull ${{ secrets.DOCKER_USERNAME }}/3xui-parser:latest

          docker stop ${{ secrets.CONTAINER_NAME }} || true
          docker rm ${{ secrets.CONTAINER_NAME }} || true

          docker run -d \
          --name ${{ secrets.CONTAINER_NAME }} \
          -v /opt/xui-bot/data:/data \
          --restart always \
          --env-file /opt/xui-bot/.env \
          ${{ secrets.DOCKER_USERNAME }}/3xui-parser:latest